<body>
    <h2>MoonVeil Obfuscator v1.4.5 (Web)</h2>
    <p>Вставьте Lua-скрипт (работает в Roblox), нажмите "Obfuscate" для получения обфусцированного кода.</p>
    <div class="container">

if false then
    print("goodbye world!")
end

        </div>
        <div class="panel">
            <label>Обфусцированный код (Lua, Roblox совместим):</label>
            <textarea id="outputCode" readonly></textarea>
            <button id="obfuscateBtn" disabled>Загрузка парсера...</button>
            <span id="status"></span>
        </div>
    </div>

    <script>
        // Динамическая загрузка luaparse с fallback
        function loadScript(src, fallbackSrc, callback) {
            const script = document.createElement('script');
            script.src = src;
            script.onload = function() {
                if (typeof luaparse !== 'undefined') {
                    callback();
                } else {
                    // Если не определился — пробуем fallback
                    if (fallbackSrc) {
                        loadScript(fallbackSrc, null, callback);
                    } else {
                        document.getElementById('status').textContent = 'Ошибка: не удалось загрузить парсер Lua (luaparse). Проверьте соединение.';
                        document.getElementById('obfuscateBtn').disabled = false;
                    }
                }
            };
            script.onerror = function() {
                if (fallbackSrc) {
                    loadScript(fallbackSrc, null, callback);
                } else {
                    document.getElementById('status').textContent = 'Ошибка: не удалось загрузить парсер Lua (luaparse). Проверьте соединение.';
                    document.getElementById('obfuscateBtn').disabled = false;
                }
            };
            document.head.appendChild(script);
        }

        // После загрузки luaparse запускаем обфускатор
        function initObfuscator() {
            if (typeof luaparse === 'undefined') {
                document.getElementById('status').textContent = 'Ошибка: luaparse не определён после загрузки.';
                document.getElementById('obfuscateBtn').disabled = false;
                return;
            }
            document.getElementById('obfuscateBtn').disabled = false;
            document.getElementById('obfuscateBtn').textContent = 'Obfuscate';
            document.getElementById('status').textContent = 'Готов к работе.';

            (function() {
                // ========== Конфигурация обфускатора ==========
                const XOR_KEY = generateRandomString(8);
                const BASE64_ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
                const FIELD_OP = randomInt(10000, 99999);
                const FIELD_A = randomInt(10000, 99999);
                const FIELD_B = randomInt(10000, 99999);
                const FIELD_C = randomInt(10000, 99999);

                // ========== Генераторы случайных данных ==========
                function randomInt(min, max) {
                    return Math.floor(Math.random() * (max - min + 1)) + min;
                }
                function generateRandomString(length) {
                    const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                    let result = '';
                    for (let i = 0; i < length; i++) result += chars[randomInt(0, chars.length - 1)];
                    return result;
                }
                function randomVarName() {
                    const len = randomInt(2, 4);
                    const letters = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
                    let name = '';
                    for (let i = 0; i < len; i++) name += letters[randomInt(0, letters.length - 1)];
                    return name;
                }

                // ========== Компилятор Lua -> байткод VM ==========
                const Opcodes = {
                    LOADK: 1, MOVE: 2, ADD: 3, SUB: 4, MUL: 5, DIV: 6, MOD: 7, POW: 8,
                    CONCAT: 9, JMP: 10, JMPT: 11, JMPF: 12, CALL: 13, RETURN: 14,
                    NEWTABLE: 15, SETTABLE: 16, GETTABLE: 17, SETGLOBAL: 18, GETGLOBAL: 19,
                    CLOSURE: 20, FORPREP: 21, FORLOOP: 22, UNM: 23, NOT: 24, LEN: 25,
                    EQ: 26, LT: 27, LE: 28,
                };

                class FuncProto {
                    constructor() {
                        this.instructions = [];
                        this.constants = [];
                        this.funcProtos = [];
                        this.maxRegs = 0;
                    }
                    addConstant(value) {
                        for (let i = 0; i < this.constants.length; i++) {
                            if (this.constants[i] === value) return i;
                        }
                        this.constants.push(value);
                        return this.constants.length - 1;
                    }
                    emit(op, a, b, c) {
                        this.instructions.push({ op, a, b, c });
                        const update = (v) => { if (typeof v === 'number' && v > this.maxRegs) this.maxRegs = v; };
                        update(a); update(b); update(c);
                    }
                }

                class Compiler {
                    constructor() {
                        this.proto = new FuncProto();
                        this.nextReg = 0;
                        this.locals = new Map();
                        this.scopeStack = [];
                    }

                    allocReg() { return this.nextReg++; }

                    pushScope() { this.scopeStack.push(new Map(this.locals)); }
                    popScope() { if (this.scopeStack.length > 0) this.locals = this.scopeStack.pop(); }
                    setLocal(name, reg) { this.locals.set(name, reg); }
                    getLocal(name) {
                        for (let i = this.scopeStack.length - 1; i >= 0; i--) {
                            if (this.scopeStack[i].has(name)) return this.scopeStack[i].get(name);
                        }
                        return this.locals.get(name) || null;
                    }

                    compileExpression(expr) {
                        if (!expr) return null;
                        switch (expr.type) {
                            case 'NumericLiteral':
                            case 'StringLiteral':
                            case 'BooleanLiteral':
                            case 'NilLiteral': {
                                const val = expr.type === 'NumericLiteral' ? expr.value :
                                            expr.type === 'StringLiteral' ? expr.value :
                                            expr.type === 'BooleanLiteral' ? expr.value : null;
                                const constIdx = this.proto.addConstant(val);
                                const reg = this.allocReg();
                                this.proto.emit(Opcodes.LOADK, reg, constIdx, 0);
                                return reg;
                            }
                            case 'Identifier': {
                                const name = expr.name;
                                const localReg = this.getLocal(name);
                                if (localReg !== null) {
                                    return localReg;
                                } else {
                                    const constIdx = this.proto.addConstant(name);
                                    const reg = this.allocReg();
                                    this.proto.emit(Opcodes.GETGLOBAL, reg, constIdx, 0);
                                    return reg;
                                }
                            }
                            case 'UnaryExpression': {
                                const argReg = this.compileExpression(expr.argument);
                                const reg = this.allocReg();
                                let op;
                                switch (expr.operator) {
                                    case '-': op = Opcodes.UNM; break;
                                    case 'not': op = Opcodes.NOT; break;
                                    case '#': op = Opcodes.LEN; break;
                                    default: throw new Error('Unknown unary operator: ' + expr.operator);
                                }
                                this.proto.emit(op, reg, argReg, 0);
                                return reg;
                            }
                            case 'BinaryExpression':
                            case 'LogicalExpression': {
                                if (expr.operator === 'and' || expr.operator === 'or') {
                                    return this.compileLogical(expr);
                                }
                                const leftReg = this.compileExpression(expr.left);
                                const rightReg = this.compileExpression(expr.right);
                                const reg = this.allocReg();
                                let op;
                                switch (expr.operator) {
                                    case '+': op = Opcodes.ADD; break;
                                    case '-': op = Opcodes.SUB; break;
                                    case '*': op = Opcodes.MUL; break;
                                    case '/': op = Opcodes.DIV; break;
                                    case '%': op = Opcodes.MOD; break;
                                    case '^': op = Opcodes.POW; break;
                                    case '..': op = Opcodes.CONCAT; break;
                                    case '==': op = Opcodes.EQ; break;
                                    case '<': op = Opcodes.LT; break;
                                    case '<=': op = Opcodes.LE; break;
                                    case '>': {
                                        this.proto.emit(Opcodes.LT, reg, rightReg, leftReg);
                                        return reg;
                                    }
                                    case '>=': {
                                        this.proto.emit(Opcodes.LE, reg, rightReg, leftReg);
                                        return reg;
                                    }
                                    case '~=': {
                                        const eqReg = this.allocReg();
                                        this.proto.emit(Opcodes.EQ, eqReg, leftReg, rightReg);
                                        this.proto.emit(Opcodes.NOT, reg, eqReg, 0);
                                        return reg;
                                    }
                                    default: throw new Error('Unknown binary operator: ' + expr.operator);
                                }
                                this.proto.emit(op, reg, leftReg, rightReg);
                                return reg;
                            }
                            case 'CallExpression': {
                                const baseReg = this.compileExpression(expr.base);
                                const args = expr.arguments || [];
                                const argRegs = args.map(arg => this.compileExpression(arg));
                                for (let i = 0; i < argRegs.length; i++) {
                                    if (argRegs[i] !== baseReg + 1 + i) {
                                        this.proto.emit(Opcodes.MOVE, baseReg + 1 + i, argRegs[i], 0);
                                    }
                                }
                                this.proto.emit(Opcodes.CALL, baseReg, args.length, 1);
                                return baseReg;
                            }
                            case 'MemberExpression': {
                                const baseReg = this.compileExpression(expr.base);
                                const key = expr.identifier ? expr.identifier.name : null;
                                if (!key) throw new Error('Only dot-member expressions supported');
                                const keyConstIdx = this.proto.addConstant(key);
                                const reg = this.allocReg();
                                this.proto.emit(Opcodes.GETTABLE, reg, baseReg, keyConstIdx);
                                return reg;
                            }
                            case 'TableConstructorExpression': {
                                const tableReg = this.allocReg();
                                this.proto.emit(Opcodes.NEWTABLE, tableReg, 0, 0);
                                let autoIndex = 1;
                                for (const field of expr.fields) {
                                    let keyReg, valueReg;
                                    if (field.type === 'TableKey') {
                                        keyReg = this.compileExpression(field.key);
                                        valueReg = this.compileExpression(field.value);
                                    } else if (field.type === 'TableValue') {
                                        keyReg = this.compileExpression({ type: 'NumericLiteral', value: autoIndex++ });
                                        valueReg = this.compileExpression(field.value);
                                    } else continue;
                                    this.proto.emit(Opcodes.SETTABLE, tableReg, keyReg, valueReg);
                                }
                                return tableReg;
                            }
                            default:
                                throw new Error('Unsupported expression type: ' + expr.type);
                        }
                    }

                    compileLogical(expr) {
                        const leftReg = this.compileExpression(expr.left);
                        const resultReg = this.allocReg();
                        this.proto.emit(Opcodes.MOVE, resultReg, leftReg, 0);
                        if (expr.operator === 'and') {
                            const jmpfIdx = this.proto.instructions.length;
                            this.proto.emit(Opcodes.JMPF, leftReg, 0, 0);
                            const rightReg = this.compileExpression(expr.right);
                            this.proto.emit(Opcodes.MOVE, resultReg, rightReg, 0);
                            this.proto.instructions[jmpfIdx].b = this.proto.instructions.length - jmpfIdx - 1;
                        } else { // or
                            const jmptIdx = this.proto.instructions.length;
                            this.proto.emit(Opcodes.JMPT, leftReg, 0, 0);
                            const rightReg = this.compileExpression(expr.right);
                            this.proto.emit(Opcodes.MOVE, resultReg, rightReg, 0);
                            this.proto.instructions[jmptIdx].b = this.proto.instructions.length - jmptIdx - 1;
                        }
                        return resultReg;
                    }

                    compileStatement(stmt) {
                        if (!stmt) return;
                        switch (stmt.type) {
                            case 'LocalStatement': {
                                const vars = stmt.variables;
                                const inits = stmt.init || [];
                                for (let i = 0; i < vars.length; i++) {
                                    const name = vars[i].name;
                                    const initExpr = inits[i] || { type: 'NilLiteral' };
                                    const reg = this.compileExpression(initExpr);
                                    this.setLocal(name, reg);
                                }
                                break;
                            }
                            case 'AssignmentStatement': {
                                const vars = stmt.variables;
                                const inits = stmt.init || [];
                                for (let i = 0; i < vars.length; i++) {
                                    const varExpr = vars[i];
                                    const valueReg = this.compileExpression(inits[i] || { type: 'NilLiteral' });
                                    if (varExpr.type === 'Identifier') {
                                        const localReg = this.getLocal(varExpr.name);
                                        if (localReg !== null) {
                                            this.proto.emit(Opcodes.MOVE, localReg, valueReg, 0);
                                        } else {
                                            const nameConstIdx = this.proto.addConstant(varExpr.name);
                                            this.proto.emit(Opcodes.SETGLOBAL, valueReg, nameConstIdx, 0);
                                        }
                                    } else if (varExpr.type === 'MemberExpression') {
                                        const baseReg = this.compileExpression(varExpr.base);
                                        const keyName = varExpr.identifier ? varExpr.identifier.name : null;
                                        if (!keyName) throw new Error('Only dot assignments supported');
                                        const keyConstIdx = this.proto.addConstant(keyName);
                                        this.proto.emit(Opcodes.SETTABLE, baseReg, keyConstIdx, valueReg);
                                    }
                                }
                                break;
                            }
                            case 'CallStatement': {
                                this.compileExpression(stmt.expression);
                                break;
                            }
                            case 'IfStatement': {
                                const clauses = stmt.clauses;
                                const endJumps = [];
                                for (let i = 0; i < clauses.length; i++) {
                                    const clause = clauses[i];
                                    if (clause.condition) {
                                        const condReg = this.compileExpression(clause.condition);
                                        const jmpfIdx = this.proto.instructions.length;
                                        this.proto.emit(Opcodes.JMPF, condReg, 0, 0);
                                        this.compileBlock(clause.body);
                                        const jmpEndIdx = this.proto.instructions.length;
                                        this.proto.emit(Opcodes.JMP, 0, 0, 0);
                                        endJumps.push(jmpEndIdx);
                                        this.proto.instructions[jmpfIdx].b = this.proto.instructions.length - jmpfIdx - 1;
                                    } else {
                                        this.compileBlock(clause.body);
                                    }
                                }
                                const endPos = this.proto.instructions.length;
                                for (const idx of endJumps) {
                                    this.proto.instructions[idx].b = endPos - idx - 1;
                                }
                                break;
                            }
                            case 'WhileStatement': {
                                const startPos = this.proto.instructions.length;
                                const condReg = this.compileExpression(stmt.condition);
                                const jmpfIdx = this.proto.instructions.length;
                                this.proto.emit(Opcodes.JMPF, condReg, 0, 0);
                                this.compileBlock(stmt.body);
                                this.proto.emit(Opcodes.JMP, 0, startPos - this.proto.instructions.length, 0);
                                const endPos = this.proto.instructions.length;
                                this.proto.instructions[jmpfIdx].b = endPos - jmpfIdx - 1;
                                break;
                            }
                            case 'DoStatement': {
                                this.compileBlock(stmt.body);
                                break;
                            }
                            case 'ForNumericStatement': {
                                const varName = stmt.variable.name;
                                const startReg = this.compileExpression(stmt.start);
                                const endReg = this.compileExpression(stmt.end);
                                const stepReg = stmt.step ? this.compileExpression(stmt.step) : null;
                                const loopVarReg = this.allocReg();
                                this.setLocal(varName, loopVarReg);
                                this.proto.emit(Opcodes.MOVE, loopVarReg, startReg, 0);
                                const prepIdx = this.proto.instructions.length;
                                this.proto.emit(Opcodes.FORPREP, loopVarReg, endReg, stepReg || 0);
                                const loopStart = this.proto.instructions.length;
                                this.compileBlock(stmt.body);
                                this.proto.emit(Opcodes.FORLOOP, loopVarReg, endReg, stepReg || 0);
                                this.proto.instructions[this.proto.instructions.length - 1].c = loopStart - this.proto.instructions.length;
                                const exitPos = this.proto.instructions.length;
                                this.proto.instructions[prepIdx].c = exitPos - prepIdx - 1;
                                break;
                            }
                            case 'ForGenericStatement': {
                                const varNames = stmt.variables.map(v => v.name);
                                const iterExpr = stmt.iterators[0];
                                if (iterExpr.type === 'CallExpression') {
                                    const baseReg = this.compileExpression(iterExpr.base);
                                    const args = iterExpr.arguments || [];
                                    const argRegs = args.map(a => this.compileExpression(a));
                                    for (let i = 0; i < argRegs.length; i++) {
                                        if (argRegs[i] !== baseReg + 1 + i) {
                                            this.proto.emit(Opcodes.MOVE, baseReg + 1 + i, argRegs[i], 0);
                                        }
                                    }
                                    this.proto.emit(Opcodes.CALL, baseReg, args.length, 3);
                                    const fReg2 = baseReg;
                                    const sReg2 = baseReg + 1;
                                    const varReg2 = baseReg + 2;
                                    if (varNames[0]) this.setLocal(varNames[0], varReg2);
                                    if (varNames[1]) this.setLocal(varNames[1], fReg2);
                                    const loopStartPos = this.proto.instructions.length;
                                    this.proto.emit(Opcodes.MOVE, fReg2 + 1, sReg2, 0);
                                    this.proto.emit(Opcodes.MOVE, fReg2 + 2, varReg2, 0);
                                    this.proto.emit(Opcodes.CALL, fReg2, 2, 2);
                                    const newVar1 = fReg2;
                                    const newVar2 = fReg2 + 1;
                                    const nilConst = this.proto.addConstant(null);
                                    const tempReg = this.allocReg();
                                    this.proto.emit(Opcodes.LOADK, tempReg, nilConst, 0);
                                    const eqReg = this.allocReg();
                                    this.proto.emit(Opcodes.EQ, eqReg, newVar1, tempReg);
                                    const jmpfIdx = this.proto.instructions.length;
                                    this.proto.emit(Opcodes.JMPF, eqReg, 0, 0);
                                    if (varNames[0]) this.setLocal(varNames[0], newVar1);
                                    if (varNames[1]) this.setLocal(varNames[1], newVar2);
                                    this.compileBlock(stmt.body);
                                    this.proto.emit(Opcodes.JMP, 0, loopStartPos - this.proto.instructions.length, 0);
                                    const exitPos = this.proto.instructions.length;
                                    this.proto.instructions[jmpfIdx].b = exitPos - jmpfIdx - 1;
                                } else {
                                    throw new Error('For generic only supports call expression');
                                }
                                break;
                            }
                            case 'ReturnStatement': {
                                const args = stmt.arguments || [];
                                if (args.length === 0) {
                                    this.proto.emit(Opcodes.RETURN, 0, 0, 0);
                                } else {
                                    const regs = args.map(a => this.compileExpression(a));
                                    for (let i = 0; i < regs.length; i++) {
                                        if (regs[i] !== regs[0] + i) {
                                            this.proto.emit(Opcodes.MOVE, regs[0] + i, regs[i], 0);
                                        }
                                    }
                                    this.proto.emit(Opcodes.RETURN, regs[0], regs.length, 0);
                                }
                                break;
                            }
                        }
                    }

                    compileBlock(body) {
                        for (const stmt of body) this.compileStatement(stmt);
                    }

                    compileChunk(body) {
                        this.compileBlock(body);
                        const last = this.proto.instructions[this.proto.instructions.length - 1];
                        if (!last || last.op !== Opcodes.RETURN) {
                            this.proto.emit(Opcodes.RETURN, 0, 0, 0);
                        }
                        return this.proto;
                    }
                }

                // ========== Сериализация байткода ==========
                function serializeProto(proto) {
                    const buffers = [];
                    const constCount = proto.constants.length;
                    const constHeader = new ArrayBuffer(2);
                    new DataView(constHeader).setUint16(0, constCount, true);
                    buffers.push(constHeader);
                    for (const val of proto.constants) {
                        if (typeof val === 'number') {
                            const buf = new ArrayBuffer(9);
                            const view = new DataView(buf);
                            view.setUint8(0, 0);
                            view.setFloat64(1, val, true);
                            buffers.push(buf);
                        } else if (typeof val === 'string') {
                            const encrypted = xorEncrypt(val, XOR_KEY);
                            const strBytes = new TextEncoder().encode(encrypted);
                            const buf = new ArrayBuffer(1 + 2 + strBytes.length);
                            const view = new DataView(buf);
                            view.setUint8(0, 1);
                            view.setUint16(1, strBytes.length, true);
                            new Uint8Array(buf, 3).set(strBytes);
                            buffers.push(buf);
                        } else if (typeof val === 'boolean') {
                            const buf = new ArrayBuffer(2);
                            const view = new DataView(buf);
                            view.setUint8(0, 2);
                            view.setUint8(1, val ? 1 : 0);
                            buffers.push(buf);
                        } else if (val === null) {
                            const buf = new ArrayBuffer(1);
                            new DataView(buf).setUint8(0, 3);
                            buffers.push(buf);
                        }
                    }
                    const instrCount = proto.instructions.length;
                    const instrHeader = new ArrayBuffer(2);
                    new DataView(instrHeader).setUint16(0, instrCount, true);
                    buffers.push(instrHeader);
                    for (const instr of proto.instructions) {
                        const buf = new ArrayBuffer(7);
                        const view = new DataView(buf);
                        view.setUint8(0, instr.op);
                        view.setUint16(1, instr.a, true);
                        view.setUint16(3, instr.b, true);
                        view.setUint16(5, instr.c, true);
                        buffers.push(buf);
                    }
                    const protoCount = proto.funcProtos.length;
                    const protoHeader = new ArrayBuffer(2);
                    new DataView(protoHeader).setUint16(0, protoCount, true);
                    buffers.push(protoHeader);
                    for (const sub of proto.funcProtos) {
                        buffers.push(serializeProto(sub));
                    }
                    const totalLength = buffers.reduce((sum, buf) => sum + buf.byteLength, 0);
                    const result = new Uint8Array(totalLength);
                    let offset = 0;
                    for (const buf of buffers) {
                        result.set(new Uint8Array(buf), offset);
                        offset += buf.byteLength;
                    }
                    return result.buffer;
                }

                function xorEncrypt(str, key) {
                    let result = '';
                    for (let i = 0; i < str.length; i++) {
                        result += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                    }
                    return result;
                }

                function base64Encode(buffer) {
                    const bytes = new Uint8Array(buffer);
                    let binary = '';
                    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                    return btoa(binary);
                }

                // ========== Генератор Lua-обертки ==========
                function generateLuaWrapper(compiledProto, xorKey) {
                    const serialized = serializeProto(compiledProto);
                    const base64String = base64Encode(serialized);
                    const names = {
                        decodeXor: randomVarName(),

                function obfuscate(luaCode) {
                    const ast = luaparse.parse(luaCode);
                    const compiler = new Compiler();
                    const proto = compiler.compileChunk(ast.body);
                    return generateLuaWrapper(proto, XOR_KEY);
